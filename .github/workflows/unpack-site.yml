name: Unpack configurator assets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack-assets:
    if: ${{ !contains(github.event.head_commit.message, 'Unpack configurator assets') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack only image assets
        run: |
          set -e
          if [ ! -f "kamenarstvo_konfigurator.zip" ]; then
            echo "ZIP not found, skipping asset unpack."
            exit 0
          fi
          rm -rf /tmp/kamenarstvo_unpacked
          mkdir -p /tmp/kamenarstvo_unpacked
          unzip -o "kamenarstvo_konfigurator.zip" -d /tmp/kamenarstvo_unpacked
          mkdir -p assets
          cp -R /tmp/kamenarstvo_unpacked/kamenarstvo_site/assets/. assets/
          rm -rf /tmp/kamenarstvo_unpacked

      - name: Commit assets
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "No asset changes to commit"
          else
            git commit -m "Unpack configurator assets"
            git push
          fi
