name: Unpack configurator site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack uploaded ZIP into repository root
        run: |
          set -e
          if [ ! -f "kamenarstvo_konfigurator.zip" ]; then
            echo "kamenarstvo_konfigurator.zip not found"
            exit 1
          fi
          rm -rf /tmp/kamenarstvo_unpacked
          mkdir -p /tmp/kamenarstvo_unpacked
          unzip -o "kamenarstvo_konfigurator.zip" -d /tmp/kamenarstvo_unpacked
          rm -rf assets
          rm -f index.html "index (2).html" "index(2).html" README.md
          cp -R /tmp/kamenarstvo_unpacked/kamenarstvo_site/. .
          rm -f kamenarstvo_konfigurator.zip
          rm -rf /tmp/kamenarstvo_unpacked

      - name: Commit unpacked site
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Unpack configurator site"
            git push
          fi
