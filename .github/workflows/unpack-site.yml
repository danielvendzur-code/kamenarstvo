name: Validate configurator site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          set -e
          test -f index.html
          grep -q "Konfigurátor pomníka" index.html
          echo "index.html exists and configurator markup is present."

      - name: Static site note
        run: |
          echo "No build step is required. This repository is a static HTML configurator."
